<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStream PRO | L'Avenir du Streaming Automatisé</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Plateforme de streaming futuriste premium avec catalogue TMDB en temps réel, lecteurs multi-flux et interface immersive.">
    <meta name="keywords" content="OpenStream, Poteuxx, Streaming, HD, Films, Séries, Animés">
    <link rel="icon" href="https://fav.farm/📺">
    
    <!-- Modern Fonts (Outfit for Premium Branding) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #03050a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent: #00f2ff;
            --accent-purple: #9d50bb;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --glass: rgba(8, 12, 18, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg-deep);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* HEADER & BRANDING */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 40px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; cursor: pointer; }
        .logo-badge { 
            width: 48px; height: 48px; background: linear-gradient(135deg, #00f2ff, #9d50bb); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: white; font-size: 1.4rem; 
            box-shadow: 0 0 25px var(--accent-glow);
        }
        .logo-text { color: white; display: flex; flex-direction: column; }
        .logo-text h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; line-height: 1; }
        .logo-text span { font-size: 0.65rem; color: var(--accent); font-weight: 800; letter-spacing: 1px; opacity: 0.8; }

        nav { display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 14px; border: 1px solid var(--glass-border); }
        .nav-link {
            padding: 8px 18px; border-radius: 10px;
            color: var(--text-muted); text-decoration: none;
            font-weight: 700; font-size: 0.85rem;
            transition: 0.3s; cursor: pointer;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-link.active { 
            color: white; background: linear-gradient(90deg, #00f2ff, #0072ff); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .search-container {
            position: relative; background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border); border-radius: 14px;
            display: flex; align-items: center; padding: 0 18px; width: 250px;
        }
        .search-container input { background: none; border: none; color: white; padding: 10px 10px; width: 100%; }

        /* HERO AREA */
        .hero { position: relative; width: 100%; height: 80vh; display: flex; align-items: center; padding: 0 40px; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: -2; transition: opacity 1.2s ease; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, var(--bg-deep) 10%, rgba(5, 7, 10, 0.4) 60%, transparent 100%), linear-gradient(0deg, var(--bg-deep) 0%, transparent 40%); z-index: -1; }
        #heroTrailer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; z-index: -1; transition: opacity 2s ease; }

        /* DASHBOARD SUPREMACY */
        .welcome-panel {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.12), rgba(157, 80, 187, 0.12));
            border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 60px 50px; margin-bottom: 80px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; gap: 30px; backdrop-filter: blur(25px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 40px rgba(0, 242, 255, 0.05);
            position: relative; z-index: 50;
        }
        .w-text h2 { font-size: 3.5rem; font-weight: 950; margin-bottom: 12px; color: var(--accent); letter-spacing: -2px; text-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .w-text p { color: rgba(255,255,255,0.8); font-size: 1.2rem; line-height: 1.6; max-width: 850px; margin: 0 auto; }
        .w-stats { display: flex; gap: 30px; margin-top: 10px; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 20px 35px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; min-width: 170px; transition: 0.4s var(--transition); }
        .stat-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(0, 242, 255, 0.08); }
        .stat-val { display: block; font-size: 2rem; font-weight: 950; color: white; }
        .stat-lab { font-size: 0.8rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* DUAL-PANE LAYOUT */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin-top: 40px; }
        .content-area { min-width: 0; }
        
        .sidebar {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0, 242, 255, 0.01));
            border: 1px solid var(--glass-border); border-radius: 22px; overflow: hidden;
            height: fit-content; position: sticky; top: 100px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .side-preview { width: 100%; height: 180px; background: #000; position: relative; border-bottom: 1px solid var(--glass-border); display: none; }
        .side-preview iframe { width: 100%; height: 100%; border: none; }
        .preview-mute { position: absolute; bottom: 10px; right: 10px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); opacity: 0; transition: 0.3s; z-index: 10; }
        .side-preview:hover .preview-mute { opacity: 1; }
        .preview-mute.active-sound { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .side-body { padding: 25px; }
        .side-title { font-size: 1rem; font-weight: 900; color: var(--accent); margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
        .side-item { display: flex; gap: 15px; margin-bottom: 20px; cursor: pointer; transition: 0.4s var(--transition); padding: 8px; border-radius: 12px; }
        .side-item:hover { background: rgba(0, 242, 255, 0.04); transform: scale(1.02); }
        .side-item img { width: 55px; height: 80px; border-radius: 6px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .side-info { display: flex; flex-direction: column; justify-content: center; }
        .side-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; color: #f1f5f9; }
        .side-rank { font-size: 0.7rem; color: var(--accent); font-weight: 900; opacity: 0.7; }

        .container { padding: 40px; margin-top: -180px; position: relative; z-index: 10; max-width: 1800px; margin-left: auto; margin-right: auto; }

        /* GRID SYSTEM */
        .row-section { margin-bottom: 50px; }
        .row-title { font-size: 1.8rem; font-weight: 950; margin-bottom: 20px; letter-spacing: -1px; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        /* CARD SYSTEM */
        .m-card {
            height: 158px; position: relative; border-radius: 12px; background: var(--bg-card);
            border: 1px solid var(--glass-border); cursor: pointer; transition: 0.45s var(--transition);
            overflow: hidden;
        }
        .m-card:hover { transform: scale(1.15); z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0, 242, 255, 0.2); border-color: rgba(255,255,255,0.5); }
        .m-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .m-card:hover img { filter: brightness(0.4); }
        .m-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; opacity: 0; transition: 0.3s; pointer-events: none; }
        .m-card:hover .m-overlay { opacity: 1; }
        .m-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 2px 4px black; }

        .m-actions { display: flex; gap: 8px; pointer-events: auto; }
        .m-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .m-btn:hover { background: white; color: black; transform: scale(1.1); }
        
        /* MODAL SYSTEM */
        .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s var(--transition); }
        .modal.active { display: flex; opacity: 1; }
        .m-content { background: #080a0f; width: 95%; max-width: 1000px; max-height: 90vh; border-radius: 22px; border: 1px solid var(--glass-border); overflow-y: auto; position: relative; }

        /* BUTTONS */
        .btn-main { padding: 14px 28px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; display: flex; align-items: center; gap: 10px; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; box-shadow: 0 0 20px rgba(0, 217, 255, 0.4); }
        .btn-primary:hover { background: white; color: black; transform: scale(1.05); }
        .btn-sec { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }

        .mute-toggle { position: absolute; bottom: 40px; right: 60px; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; opacity: 0; transition: 0.4s; }
        .hero:hover .mute-toggle { opacity: 1; }
        .mute-toggle.active-sound { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }

        .hero-h1 { font-size: 4rem; font-weight: 900; line-height: 0.95; margin-bottom: 20px; }
        .hero-p { font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; max-width: 650px; margin-bottom: 35px; }

        /* BRUT PLAYER SYSTEM */
        .player-frame { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; }
        .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        .brut-factory { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; color: var(--accent); font-weight: 800; font-family: monospace; letter-spacing: 2px; }
        .brut-controls { background: #000; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--glass-border); }
        .s-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #aaa; padding: 10px 22px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .s-btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }

        .repair-brut { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo" onclick="location.reload()">
            <div class="logo-badge">OS</div>
            <div class="logo-text">
                <h1>OPEN STREAM</h1>
                <span>BY SOLUTIONS TECHNOLOGIES</span>
            </div>
        </div>

        <nav>
            <a class="nav-link active" onclick="switchView('home')">ACCEUIL</a>
            <a class="nav-link" onclick="switchView('movie')">FILMS</a>
            <a class="nav-link" onclick="switchView('tv')">SÉRIES</a>
            <a class="nav-link" onclick="switchView('docu')">DOCUS</a>
        </nav>

        <div class="search-container">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="masterSearch" placeholder="Rechercher...">
        </div>
    </header>

    <section class="hero" id="heroView">
        <div class="hero-bg" id="hBg"></div>
        <div id="heroTrailer"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content" id="hContent">
            <h1 class="hero-h1" id="hTitle">Chargement...</h1>
            <p class="hero-p" id="hDesc">Exploration des archives galactiques en cours. Préparez votre visionnage.</p>
            <div class="hero-btn-group" style="display:flex; gap:20px">
                <button class="btn-main btn-primary" onclick="playHero()">LECTURE</button>
                <button class="btn-main btn-sec" onclick="infoHero()">DÉTAILS</button>
            </div>
        </div>

        <button class="mute-toggle" id="muteBtn" onclick="toggleHeroSound()">
            <svg id="volIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
    </section>

    <div class="container">
        <div id="dynamicRows"></div>
    </div>

    <!-- MODAL DETAILS -->
    <div class="modal info-modal" id="iModal">
        <div class="m-content">
            <div class="m-close" onclick="closeModal('iModal')">&times;</div>
            <div id="iHero" style="height:480px; background-size:cover; background-position:center; position:relative;"></div>
            <div style="padding:40px 60px; display:grid; grid-template-columns: 1.8fr 1.2fr; gap:50px;">
                <div>
                    <h2 id="iTitle" style="font-size:3rem; font-weight:950; margin-bottom:20px;">Title</h2>
                    <p id="iDesc" style="font-size:1.1rem; line-height:1.7; color:#cbd5e1;"></p>
                    <button class="btn-main btn-primary" id="iPlayBtn" style="margin-top:30px">LECTURE</button>
                </div>
                <div>
                    <div style="font-size:0.9rem; color:#64748b;">Genres: <span id="iGenres" style="color:white; font-weight:600;"></span></div>
                    <div style="font-size:0.9rem; color:#64748b; margin-top:20px;">Cast: <div id="iCast" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="modal" id="pModal">
        <div class="m-content" style="max-width: 1100px;">
            <div class="m-close" onclick="closePlayer()">&times;</div>
            <div class="player-frame" id="playerWrapper"></div>
            <div class="brut-controls">
                <div id="svGrid" style="display:flex; gap:10px;"></div>
                <button class="repair-brut" onclick="reclaimPlayer(true)">FORCE BYPASS</button>
            </div>
        </div>
    </div>

    <script>
        const TMDB_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb';
        let mainCatalog = [];
        let ytPlayer = null;
        let pPlayer = null;
        let isMuted = true;
        let pMuted = true;
        let currentView = 'home';
        let activeItem = null;
        let activeServer = 'vl';

        const SERVERS = [
            { id: 'vl', name: 'FLUX 1', url: item => `https://frembed.pro/api/${item.type === 'tv' ? 'serie' : 'film'}.php?id=${item.tmdbId}` },
            { id: 'v2', name: 'FLUX 2', url: item => `https://vidsrc.to/embed/${item.type === 'tv' ? 'tv' : 'movie'}/${item.tmdbId}` },
            { id: 'ae', name: 'AUTO FR', url: item => `https://autoembed.co/${item.type === 'tv' ? 'tv' : 'movie'}/tmdb/${item.tmdbId}?lang=fr` }
        ];

        window.onload = async () => {
            loadYTAPI();
            await syncCatalog();
            switchView('home');
        };

        function loadYTAPI() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        async function syncCatalog() {
            const endpoints = ['trending/all/day', 'movie/popular', 'tv/popular', 'discover/movie?with_genres=99'];
            let calls = [];
            endpoints.forEach(ep => { for(let p=1; p<=3; p++) calls.push(`https://api.themoviedb.org/3/${ep}?api_key=${TMDB_KEY}&language=fr-FR&page=${p}`); });
            const results = await Promise.all(calls.map(url => fetch(url).then(r => r.json())));
            let raw = [];
            results.forEach(res => { if(res.results) raw = [...raw, ...res.results] });
            mainCatalog = raw.filter(i => i.poster_path && i.backdrop_path).map(i => ({
                id: i.id,
                tmdbId: i.id,
                type: i.media_type === 'tv' ? 'tv' : (i.genre_ids.includes(99) ? 'docu' : 'movie'),
                title: i.title || i.name,
                overview: i.overview || "Résumé non disponible.",
                poster: `https://image.tmdb.org/t/p/w500${i.poster_path}`,
                backdrop: `https://image.tmdb.org/t/p/original${i.backdrop_path}`,
                year: (i.release_date || i.first_air_date || '2024').split('-')[0],
                genres: i.genre_ids.join(', ')
            }));
            const seen = new Set();
            mainCatalog = mainCatalog.filter(i => { const d = seen.has(i.id); seen.add(i.id); return !d; });
            setHero(mainCatalog[0]);
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if(l.getAttribute('onclick').includes(`'${view}'`)) l.classList.add('active');
            });
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = '';
            if(view === 'home') {
                document.getElementById('heroView').style.display = 'flex';
                renderDashboard();
            } else {
                document.getElementById('heroView').style.display = 'none';
                renderGrid(view);
            }
        }

        function renderDashboard() {
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `
                <div class="welcome-panel">
                    <div class="w-text">
                        <h2>Exploration Dashboard</h2>
                        <p>Plongez dans <b>${mainCatalog.length} titres</b> premium automatisés.</p>
                    </div>
                    <div class="w-stats">
                        <div class="stat-card"><span class="stat-val">${mainCatalog.length}+</span><span class="stat-lab">Titres</span></div>
                        <div class="stat-card"><span class="stat-val">4K</span><span class="stat-lab">Qualité</span></div>
                    </div>
                </div>
                <div class="main-layout">
                    <div class="content-area" id="mainArea"></div>
                    <div class="sidebar">
                        <div class="side-preview" id="sidePreview"><div id="sideYT"></div><button class="preview-mute" id="pMuteBtn" onclick="togglePrevSound()"><svg id="pMuteIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/></svg></button></div>
                        <div class="side-body"><div class="side-title">TOP TENDANCES</div><div id="topList"></div></div>
                    </div>
                </div>
            `;
            const area = document.getElementById('mainArea');
            [{t:'VOS TENDANCES', f:()=>true}].forEach(sec => {
                const row = document.createElement('div');
                row.className = 'row-section';
                row.innerHTML = `<h2 class="row-title">${sec.t}</h2><div class="grid-view"></div>`;
                mainCatalog.slice(0,12).forEach(i => row.querySelector('.grid-view').appendChild(createCard(i)));
                area.appendChild(row);
            });
            mainCatalog.slice(5,15).forEach((item,idx) => {
                const el = document.createElement('div');
                el.className = 'side-item';
                el.onclick = () => showItemDetails(item);
                el.innerHTML = `<img src="${item.poster}"><div class="side-info"><div class="side-name">${item.title}</div><div class="side-rank">#${idx+1} RANK</div></div>`;
                document.getElementById('topList').appendChild(el);
            });
        }

        function renderGrid(type) {
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">${type.toUpperCase()}S PREMIUM</h2><div class="grid-view"></div>`;
            mainCatalog.filter(i => i.type === type).forEach(i => grid.querySelector('.grid-view').appendChild(createCard(i)));
        }

        function createCard(item) {
            const el = document.createElement('div');
            el.className = 'm-card';
            el.innerHTML = `<img src="${item.poster}"><div class="m-overlay"><div class="m-title">${item.title}</div><div class="m-actions"><button class="m-btn" onclick="event.stopPropagation(); openPlayer(item)">▶</button></div></div>`;
            el.onclick = () => showItemDetails(item);
            el.onmouseenter = () => startPreview(item);
            el.onmouseleave = () => stopPreview();
            return el;
        }

        async function startPreview(item) {
            const box = document.getElementById('sidePreview');
            if(!box) return;
            const res = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`).then(r=>r.json());
            const tr = res.results.find(v => v.type==='Trailer');
            if(tr) {
                box.style.display = 'block';
                pPlayer = new YT.Player('sideYT', { videoId: tr.key, playerVars: {autoplay:1, controls:0, mute:1} });
            }
        }

        function stopPreview() {
            const box = document.getElementById('sidePreview');
            if(box) box.style.display = 'none';
            if(pPlayer) { pPlayer.destroy(); pPlayer = null; }
        }

        function togglePrevSound() { /* Logic simplified for turn */ }

        function setHero(item) {
            document.getElementById('hBg').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('hTitle').innerText = item.title;
            document.getElementById('hDesc').innerText = item.overview;
        }

        function showItemDetails(item) {
            document.getElementById('iHero').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('iTitle').innerText = item.title;
            document.getElementById('iDesc').innerText = item.overview;
            document.getElementById('iModal').style.display = 'flex';
            document.getElementById('iModal').classList.add('active');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); setTimeout(()=>document.getElementById(id).style.display='none', 400); }

        function openPlayer(item) {
            activeItem = item;
            document.getElementById('pModal').style.display = 'flex';
            document.getElementById('pModal').classList.add('active');
            reclaimPlayer();
        }

        function reclaimPlayer(force=false) {
            const wrap = document.getElementById('playerWrapper');
            const server = SERVERS.find(s => s.id === activeServer);
            wrap.innerHTML = `<iframe src="${server.url(activeItem)}" allowfullscreen></iframe>`;
        }

        function closePlayer() { closeModal('pModal'); }
    </script>
</body>
</html>
