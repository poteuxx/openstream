<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO & Metadata -->
    <meta name="description" content="Plateforme de streaming futuriste premium avec catalogue TMDB en temps réel, lecteurs multi-flux et interface immersive.">
    <meta name="keywords" content="OpenStream, Poteuxx, Streaming, HD, Films, Séries, Animés">

    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #03050a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent: #00f2ff;
            --accent-purple: #9d50bb;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --glass: rgba(8, 12, 18, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif; }

        body { background: var(--bg-deep); color: var(--text); overflow-x: hidden; min-height: 100vh; scroll-behavior: smooth; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; z-index: 2000; display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; background: var(--glass); backdrop-filter: blur(30px); border-bottom: 1px solid var(--glass-border); }
        /* HOLOGRAPHIC LOGO REVOLUTION */
        .logo { display: flex; align-items: center; gap: 20px; text-decoration: none; cursor: pointer; transition: 0.4s var(--transition); }
        .logo:hover { transform: scale(1.03); }
        .logo-badge { width: 50px; height: 50px; background: linear-gradient(135deg, #00f2ff, #9d50bb, #00f2ff); background-size: 200% 200%; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 950; color: white; font-size: 1.4rem; box-shadow: 0 0 35px var(--accent-glow); animation: logoPulse 4s infinite, logoGradiant 6s infinite; border: 1px solid rgba(255,255,255,0.3); position: relative; overflow: hidden; }
        .logo-badge::after { content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%; background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); animation: shimmer 4s infinite; }
        
        .logo-text h1 { font-size: 1.3rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin: 0; line-height: 1; display: flex; gap: 5px; color: #f8fafc; }
        .logo-text h1 b { font-weight: 900; color: white; letter-spacing: 0; background: linear-gradient(90deg, #fff, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: logoGradiant 4s linear infinite; }
        .logo-text span { font-size: 0.5rem; color: var(--accent); font-weight: 900; letter-spacing: 3px; opacity: 0.9; text-transform: uppercase; margin-top: 5px; display: block; filter: drop-shadow(0 0 5px var(--accent-glow)); }

        @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 30px var(--accent-glow); transform: scale(1); } 50% { box-shadow: 0 0 55px var(--accent-glow); transform: scale(1.05); } }
        @keyframes logoGradiant { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes shimmer { 0% { transform: translate(-30%, -30%) rotate(0deg); } 100% { transform: translate(30%, 30%) rotate(0deg); } }

        nav { display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 14px; border: 1px solid var(--glass-border); }
        .nav-link { padding: 8px 18px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.8rem; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: white; background: linear-gradient(90deg, #00f2ff, #0072ff); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        .search-shell { position: relative; display: flex; align-items: center; justify-content: flex-end; width: 45px; height: 45px; transition: 0.6s var(--transition); overflow: hidden; background: rgba(255,255,255,0.05); border-radius: 25px; border: 1px solid var(--glass-border); cursor: pointer; }
        .search-shell:hover, .search-shell:focus-within { width: 320px; background: rgba(0,0,0,0.6); border-color: var(--accent); cursor: text; }
        .search-shell input { width: 100%; border: none; background: transparent; color: white; padding: 0 50px 0 20px; font-size: 0.95rem; opacity: 0; transition: 0.3s; }
        .search-shell:hover input, .search-shell:focus-within input { opacity: 1; }
        .search-btn { position: absolute; right: 0; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: var(--accent); transition: 0.3s; }

        /* SYSTEM & GENRE BUTTONS */
        .genre-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .g-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); color: #94a3b8; padding: 8px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; }
        .g-btn:hover, .g-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.08); }
        
        .sys-toggle { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: white; padding: 8px 15px; border-radius: 10px; font-weight: 950; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; margin-left: 15px; }
        .sys-toggle:hover { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent-glow); }

        /* GLOBAL HERO ENGINE (NETFLIX STYLE) */
        .hero { position: relative; width: 100%; height: 92vh; display: flex; align-items: flex-end; padding: 0 60px 150px; overflow: hidden; background: #000; }
        #heroTrailer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; transform: scale(1.15); transition: opacity 0.8s; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, var(--bg-deep) 100%), linear-gradient(90deg, rgba(0,0,0,0.7) 0%, transparent 70%); z-index: 3; }
        .hero-content { position: relative; z-index: 10; max-width: 45%; pointer-events: auto; }
        
        .hero-h1 { font-size: 3.5rem; font-weight: 950; line-height: 1.1; margin-bottom: 15px; text-shadow: 0 5px 25px rgba(0,0,0,1); }
        .hero-p { font-size: 1rem; color: #e2e8f0; line-height: 1.6; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 0 2px 10px rgba(0,0,0,1); }
        
        .mute-toggle { position: absolute; bottom: 150px; right: 60px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: 0.4s var(--transition); }
        .mute-toggle:hover { transform: scale(1.1); color: white; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .mute-toggle.active-sound { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 242, 255, 0.2); }
        .mute-toggle.active-sound svg { filter: drop-shadow(0 0 2px black); }

        /* LAYOUT & GRID */
        .container { padding: 40px 60px; margin-top: 0; position: relative; z-index: 50; max-width: 1920px; margin-left: auto; margin-right: auto; }
        .welcome-panel { background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(157, 80, 187, 0.1)); border: 1px solid var(--glass-border); border-radius: 35px; padding: 75px 60px; margin-bottom: 80px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 30px; backdrop-filter: blur(30px); box-shadow: 0 50px 120px rgba(0,0,0,0.9), 0 0 40px rgba(0, 242, 255, 0.05); }
        .welcome-panel h2 { font-size: 3.5rem; font-weight: 950; color: var(--accent); letter-spacing: -2px; }

        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .m-card { height: 170px; position: relative; border-radius: 15px; background: var(--bg-card); border: 1px solid var(--glass-border); cursor: pointer; transition: 0.5s var(--transition); overflow: hidden; }
        .m-card:hover { transform: scale(1.15) translateY(-5px); z-index: 100; box-shadow: 0 20px 80px rgba(0,0,0,1), 0 0 40px var(--accent-glow); border-color: rgba(255,255,255,0.6); }
        .m-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .m-card:hover img { filter: brightness(0.3); }
        .m-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; opacity: 0; transition: 0.3s; }
        .m-card:hover .m-overlay { opacity: 1; }
        .m-title { font-size: 1rem; font-weight: 800; margin-bottom: 15px; }

        .m-btn { width: 38px; height: 38px; border-radius: 50%; background: white; color: black; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: none; font-weight: 950; }
        .m-btn:hover { background: var(--accent); transform: scale(1.1); }

        /* PREMIUM DETAILS MODAL (RESTORED) */
        .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.96); backdrop-filter: blur(40px); display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s var(--transition); }
        .modal.active { display: flex; opacity: 1; }
        .m-content { background: #080a12; width: 95%; max-width: 1100px; max-height: 92vh; border-radius: 30px; border: 1px solid var(--glass-border); overflow-y: auto; position: relative; box-shadow: 0 50px 150px rgba(0,0,0,1); }
        .m-close { position: absolute; top: 30px; right: 30px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: 0.3s; }
        .m-close:hover { background: #ff4757; transform: rotate(90deg); }

        .i-hero { width: 100%; height: 380px; background-size: cover; background-position: center; position: relative; }
        .i-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, #080a12 0%, transparent 70%); }
        .i-body { padding: 30px 60px; display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 50px; }
        .i-main h2 { font-size: 2.8rem; font-weight: 950; margin-bottom: 20px; letter-spacing: -2px; }
        .i-desc { font-size: 1rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        .tag-row { display: flex; flex-direction: column; gap: 20px; }
        .tag-info { font-size: 1rem; color: #64748b; line-height: 1.5; }
        .tag-info span { color: #f1f5f9; font-weight: 600; display: block; margin-top: 8px; }
        .actor-pill { background: rgba(255,255,255,0.06); padding: 5px 15px; border-radius: 8px; font-size: 0.85rem; color: #fff; border: 1px solid rgba(255,255,255,0.1); margin: 5px; display: inline-block; }

        .player-frame { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; }
        .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        .sv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 30px; background: #05070a; border-top: 1px solid var(--glass-border); }
        .s-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #888; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .s-btn.active { background: var(--accent); color: black; border-color: var(--accent); }

        .btn-main { padding: 18px 40px; border-radius: 15px; font-weight: 950; cursor: pointer; border: none; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; font-size: 1rem; }
        .btn-primary { background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; box-shadow: 0 0 20px rgba(0, 217, 255, 0.4); }
        .btn-sec { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
    </style>
</head>

    <script>
        const TMDB_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb';
        let mainCatalog = [];
        let heroItem = null;
        let ytPlayer = null;
        let pMuted = true;
        let activeItem = null;
        let activeServerId = 's1';
        let currentView = 'home';
        let playerIsReady = false;
        let heroQueueItem = null;
        let currentLang = 'FR';
        let voiceEnabled = false;

        const LOCALE = {
            FR: { home:'ACCUEIL', films:'FILMS', series:'SÉRIES', docus:'DOCUS', about:'À PROPOS', search:'Rechercher...', config:'CONFIG', play:'LECTURE', details:'DÉTAILS', welcome:'Exploration Dashboard', subWel: 'Découvrez {n} titres premium automatisés.' },
            EN: { home:'HOME', films:'MOVIES', series:'SERIES', docus:'DOCUS', about:'ABOUT', search:'Search titles...', config:'SYSTEM', play:'PLAY NOW', details:'DETAILS', welcome:'Discovery Console', subWel: 'Explore {n} high-performance automated titles.' }
        };

        const SERVERS = [
            { id: 's1', name: 'INDUSTRIE 1', url: i => `https://frembed.pro/api/${i.type==='tv'?'serie':'film'}.php?id=${i.tmdbId}` },
            { id: 's2', name: 'INDUSTRIE 2', url: i => `https://vidsrc.to/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's3', name: 'AUTO FLUX', url: i => `https://autoembed.co/${i.type==='tv'?'tv':'movie'}/tmdb/${i.tmdbId}?lang=fr` },
            { id: 's4', name: 'INDUSTRIE 4', url: i => `https://vidsrc.me/embed/${i.type==='tv'?'tv':'movie'}?tmdb=${i.tmdbId}` },
            { id: 's5', name: 'INDUSTRIE 5', url: i => `https://vidsrc.xyz/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's6', name: 'INDUSTRIE 6', url: i => `https://embed.su/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's7', name: 'INDUSTRIE 7', url: i => `https://vidsrc.pro/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's8', name: 'INDUSTRIE 8', url: i => `https://moviesapi.club/movie/${i.tmdbId}` },
            { id: 's9', name: 'INDUSTRIE 9', url: i => `https://rembed.pro/api/${i.type==='tv'?'serie':'film'}.php?id=${i.tmdbId}` },
            { id: 's10', name: 'INDUSTRIE 10', url: i => `https://vidjoy.pro/embed/${i.tmdbId}` },
            { id: 's11', name: 'INDUSTRIE 11', url: i => `https://streamapi.cloud/embed/${i.tmdbId}` },
            { id: 's12', name: 'INDUSTRIE 12', url: i => `https://vidsrc.stream/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's13', name: 'INDUSTRIE 13', url: i => `https://2embed.org/library/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's14', name: 'INDUSTRIE 14', url: i => `https://vidsrc.online/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's15', name: 'INDUSTRIE 15', url: i => `https://vidbinge.com/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's16', name: 'INDUSTRIE 16', url: i => `https://vidsrc.cc/v2/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's17', name: 'INDUSTRIE 17', url: i => `https://embed.vidsrc.top/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's18', name: 'INDUSTRIE 18', url: i => `https://superembed.stream/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's19', name: 'INDUSTRIE 19', url: i => `https://database.gdriveplayer.us/player.php?tmdb=${i.tmdbId}` },
            { id: 's20', name: 'INDUSTRIE 20', url: i => `https://blackvid.space/embed/${i.tmdbId}` },
            { id: 's21', name: 'INDUSTRIE 21', url: i => `https://hydro.link/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's22', name: 'INDUSTRIE 22', url: i => `https://multiembed.mov/?video_id=${i.tmdbId}&tmdb=1` },
            { id: 's23', name: 'INDUSTRIE 23', url: i => `https://embed.smashystream.com/playere.php?tmdb=${i.tmdbId}` },
            { id: 's24', name: 'INDUSTRIE 24', url: i => `https://vidsrc.icu/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` }
        ];

        window.onload = async () => {
            loadYTAPI();
            await syncCatalog();
            setupSearch();
            switchView('home');
            updateUI();
        };

        function loadYTAPI() {
            window.onYouTubeIframeAPIReady = () => {
                playerIsReady = true;
                if(heroQueueItem) initHero(heroQueueItem);
            };
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        async function syncCatalog() {
            const endpoints = ['trending/all/day', 'movie/popular', 'tv/popular', 'discover/movie?with_genres=99'];
            let calls = [];
            // MASSIVE FETCH: 300+ items
            endpoints.forEach(ep => { for(let p=1; p<=8; p++) calls.push(`https://api.themoviedb.org/3/${ep}?api_key=${TMDB_KEY}&language=fr-FR&page=${p}`); });
            const results = await Promise.all(calls.map(url => fetch(url).then(r => r.json())));
            let raw = [];
            results.forEach(res => { if(res.results) raw = [...raw, ...res.results] });
            mainCatalog = raw.filter(i => i.poster_path && i.backdrop_path).map(i => ({
                id: i.id, tmdbId: i.id,
                type: i.media_type === 'tv' ? 'tv' : (i.genre_ids.includes(99) ? 'docu' : 'movie'),
                title: i.title || i.name,
                overview: i.overview || "Résumé non disponible.",
                poster: `https://image.tmdb.org/t/p/w500${i.poster_path}`,
                backdrop: `https://image.tmdb.org/t/p/original${i.backdrop_path}`,
                year: (i.release_date || i.first_air_date || '2024').split('-')[0],
                genreIds: i.genre_ids
            }));
            const seen = new Set();
            mainCatalog = mainCatalog.filter(i => { const d = seen.has(i.id + i.type); seen.add(i.id + i.type); return !d; });
            const rIdx = Math.floor(Math.random() * Math.min(mainCatalog.length, 50));
            initHero(mainCatalog[rIdx]);
        }

        async function initHero(item) {
            heroItem = item;
            document.getElementById('hTitle').innerText = item.title;
            document.getElementById('hDesc').innerText = item.overview;
            if(!playerIsReady) { heroQueueItem = item; return; }
            const res = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`).then(r=>r.json());
            const tr = res.results ? res.results.find(v => v.type==='Trailer' || v.type==='Teaser') : null;
            if(tr && ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById({ videoId: tr.key, startSeconds: 0 });
                ytPlayer.playVideo();
            } else if(tr) {
                ytPlayer = new YT.Player('heroTrailer', {
                    videoId: tr.key,
                    playerVars: { autoplay: 1, controls: 0, mute: 1, loop: 1, playlist: tr.key, fs: 0, iv_load_policy: 3, rel: 0, origin: window.location.origin },
                    events: { onReady: e => { e.target.mute(); e.target.playVideo(); } }
                });
            }
        }

        function toggleConfig() {
            currentLang = currentLang === 'FR' ? 'EN' : 'FR';
            voiceEnabled = !voiceEnabled;
            updateUI();
            speak(currentLang === 'FR' ? "Système mis à jour" : "System Updated");
        }

        function updateUI() {
            const l = LOCALE[currentLang];
            document.getElementById('navHome').innerText = l.home;
            document.getElementById('navFilms').innerText = l.films;
            document.getElementById('navSeries').innerText = l.series;
            document.getElementById('navDocus').innerText = l.docus;
            document.getElementById('navAbout').innerText = l.about;
            document.getElementById('masterSearch').placeholder = l.search;
            document.getElementById('btnSys').innerText = l.config;
            document.getElementById('hPlayBtn').innerText = l.play;
            document.getElementById('hInfoBtn').innerText = l.details;
        }

        function speak(txt) {
            if(!voiceEnabled) return;
            const s = new SpeechSynthesisUtterance(txt);
            s.lang = currentLang === 'FR' ? 'fr-FR' : 'en-US';
            window.speechSynthesis.speak(s);
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if(l.getAttribute('onclick').includes(`'${view}'`)) l.classList.add('active');
            });
            const grid = document.getElementById('dynamicRows'); grid.innerHTML = '';
            if(view === 'home') renderDashboard();
            else if(view === 'about') renderAbout();
            else renderGrid(view);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function renderDashboard() {
            const l = LOCALE[currentLang];
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `<div class="welcome-panel"><h2>${l.welcome}</h2><p>${l.subWel.replace('{n}', mainCatalog.length)}</p></div><div class="genre-bar"><button class="g-btn" onclick="filterGenre(28)">Action</button><button class="g-btn" onclick="filterGenre(12)">Aventure</button><button class="g-btn" onclick="filterGenre(14)">Fantastique</button><button class="g-btn" onclick="filterGenre(53)">Suspense</button><button class="g-btn" onclick="switchView('home')">ALL</button></div><div id="mainHomeContent"></div>`;
            const area = document.getElementById('mainHomeContent');
            const layout = [
                { t: 'TENDANCES DU MOMENT', items: mainCatalog.slice(0, 24) },
                { t: 'FILMS INCONTOURNABLES', items: mainCatalog.filter(i => i.type === 'movie').slice(0, 24) },
                { t: 'SÉRIES ÉLITES', items: mainCatalog.filter(i => i.type === 'tv').slice(0, 24) },
                { t: 'DOCUMENTAIRES RÉCENTS', items: mainCatalog.filter(i => i.type === 'docu').slice(0, 24) }
            ];
            layout.forEach(sec => {
                const row = document.createElement('div'); row.style.marginBottom = '60px';
                row.innerHTML = `<h2 class="row-title">${sec.t}</h2><div class="grid-view"></div>`;
                sec.items.forEach(i => row.querySelector('.grid-view').appendChild(createCard(i)));
                area.appendChild(row);
            });
        }

        function renderGrid(type) {
            const l = LOCALE[currentLang];
            const title = type === 'movie' ? l.films : (type === 'tv' ? l.series : l.docus);
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">${title} PREMIUM</h2><div class="grid-view" id="mainGridArea"></div>`;
            mainCatalog.filter(i => i.type === type).forEach(i => document.getElementById('mainGridArea').appendChild(createCard(i)));
        }

        function filterGenre(gid) {
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">GENRE: ${gid}</h2><div class="grid-view" id="genArea"></div>`;
            mainCatalog.filter(i => i.genreIds.includes(gid)).forEach(i => document.getElementById('genArea').appendChild(createCard(i)));
            speak(currentLang === 'FR' ? "Filtrage activé" : "Filter active");
        }

        function createCard(item) {
            const el = document.createElement('div'); el.className = 'm-card';
            el.innerHTML = `<img src="${item.poster}"><div class="m-overlay"><div class="m-title">${item.title}</div><div style="display:flex; gap:10px"><button class="m-btn" onclick="event.stopPropagation(); openPlayer(mainCatalog.find(i=>i.id==${item.id}))">▶</button><button class="m-btn" onclick="event.stopPropagation(); showItemDetails(mainCatalog.find(i=>i.id==${item.id}))">i</button></div></div>`;
            el.onclick = () => showItemDetails(item);
            el.onmouseenter = () => updateHeroTeaser(item);
            return el;
        }

        async function updateHeroTeaser(item) {
            heroItem = item;
            document.getElementById('hTitle').innerText = item.title;
            document.getElementById('hDesc').innerText = item.overview;
            const res = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`).then(r=>r.json());
            const tr = res.results ? res.results.find(v => v.type==='Trailer' || v.type==='Teaser') : null;
            if(tr && ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById({ videoId: tr.key, startSeconds: 0 });
        }

        async function showItemDetails(item) {
            speak(item.title);
            const GENRES = {28:"Action",12:"Aventure",16:"Animation",35:"Comédie",80:"Crime",99:"Docu",18:"Drame",10751:"Famille",14:"Fantaisie",36:"Histoire",27:"Horreur",10402:"Musique",9648:"Mystère",10749:"Romance",878:"SF",10770:"Téléfilm",53:"Thriller",10752:"Guerre",37:"Western"};
            document.getElementById('iHero').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('iTitle').innerText = item.title;
            document.getElementById('iDesc').innerText = item.overview;
            document.getElementById('iGenres').innerText = item.genreIds.map(id => GENRES[id] || "Premium").join(', ');
            document.getElementById('iPlayBtn').onclick = () => openPlayer(item);
            const castBox = document.getElementById('iCast'); const dirBox = document.getElementById('iDirector');
            castBox.innerHTML = '...'; try {
                const cred = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/credits?api_key=${TMDB_KEY}`).then(r=>r.json());
                if(cred) {
                    castBox.innerHTML = cred.cast.slice(0, 6).map(c => `<div class="actor-pill">${c.name}</div>`).join('');
                    const staff = cred.crew.find(c => c.job === 'Director' || c.job === 'Producer');
                    if(staff) dirBox.innerText = staff.name;
                }
            } catch(e){}
            const m = document.getElementById('iModal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 50);
        }

        function openPlayer(item) {
            if(!item) return; activeItem = item; if(ytPlayer) ytPlayer.pauseVideo();
            const m = document.getElementById('pModal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 50);
            renderServers(); reclaimPlayer();
        }

        function renderServers() {
            const grid = document.getElementById('svButtons'); grid.innerHTML = '';
            SERVERS.forEach(s => {
                const b = document.createElement('button'); b.className = `s-btn ${s.id === activeServerId ? 'active' : ''}`; b.innerText = s.name;
                b.onclick = () => { activeServerId = s.id; renderServers(); reclaimPlayer(); };
                grid.appendChild(b);
            });
        }

        function reclaimPlayer() { document.getElementById('playerWrapper').innerHTML = `<iframe src="${SERVERS.find(s => s.id === activeServerId).url(activeItem)}" allowfullscreen></iframe>`; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); setTimeout(()=>document.getElementById(id).style.display='none', 400); }
        function closePlayer() { closeModal('pModal'); if(ytPlayer) ytPlayer.playVideo(); }
        function toggleHeroSound() {
            pMuted = !pMuted; const btn = document.getElementById('muteBtn'); const icon = document.getElementById('volIcon');
            if(pMuted) { ytPlayer.mute(); btn.classList.remove('active-sound'); icon.innerHTML = '<path d="M11 5L6 9H2V15H6L11 19V5Z"/><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>'; }
            else { ytPlayer.unMute(); btn.classList.add('active-sound'); icon.innerHTML = '<path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>'; }
        }

        function setupSearch() {
            document.getElementById('masterSearch').oninput = (e) => {
                const q = e.target.value.toLowerCase();
                if(q.length < 2) { if(currentView === 'home') renderDashboard(); return; }
                const grid = document.getElementById('dynamicRows');
                grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">RÉSULTATS:</h2><div class="grid-view" id="searchArea"></div>`;
                mainCatalog.filter(i => i.title.toLowerCase().includes(q)).forEach(i => document.getElementById('searchArea').appendChild(createCard(i)));
            };
        }
    </script>
</body>
</html>
