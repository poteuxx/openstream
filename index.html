<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStream — Futuristic Entertainment Hub</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Plateforme de streaming futuriste premium avec catalogue TMDB en temps réel, lecteurs multi-flux et interface immersive.">
    <meta name="keywords" content="OpenStream, Poteuxx, Streaming, HD, Films, Séries, Animés">
    <link rel="icon" href="https://fav.farm/📺">
    
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-card: #0c0f17;
            --accent: #00d9ff;
            --accent-purple: #8b5cf6;
            --accent-pink: #ff3cac;
            --text: #ffffff;
            --text-muted: #8b95b7;
            --glass: rgba(15, 20, 35, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-glow: 0 10px 40px rgba(0, 217, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-deep);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--accent), var(--accent-purple)); 
            border-radius: 10px; 
        }

        /* DYNAMIC BG */
        #particles {
            position: fixed;
            inset: 0;
            z-index: -5;
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.12;
            z-index: -4;
            pointer-events: none;
            transition: 2s var(--transition);
        }

        .glow-top { width: 800px; height: 800px; background: var(--accent); top: -300px; left: -200px; }
        .glow-bottom { width: 900px; height: 900px; background: var(--accent-purple); bottom: -400px; right: -200px; }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        header.scrolled {
            padding: 10px 40px;
            background: rgba(5, 7, 10, 0.95);
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .logo-ring {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.3rem;
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.4);
        }

        .brand-text h1 { font-size: 1.3rem; font-weight: 950; letter-spacing: -1px; }
        .brand-text span { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        nav { display: flex; gap: 15px; margin-left: 40px; }
        .nav-link {
            padding: 10px 20px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { color: white; background: rgba(255,255,255,0.06); }

        .search-container {
            position: relative;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            transition: 0.4s;
            width: 250px;
        }
        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
            width: 350px;
        }
        .search-container input {
            background: none;
            border: none;
            color: white;
            padding: 10px 10px;
            width: 100%;
            font-size: 0.9rem;
        }

        /* HERO AREA */
        .hero {
            position: relative;
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            padding: 0 40px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: opacity 1.2s ease;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--bg-deep) 10%, rgba(5, 7, 10, 0.4) 60%, transparent 100%),
                        linear-gradient(0deg, var(--bg-deep) 0%, transparent 40%);
            z-index: -1;
        }

        #heroTrailer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: -1;
            transition: opacity 2s ease;
        }
        #heroTrailer iframe { width: 100.2%; height: 100.2%; border: none; transform: scale(1.15); }

        .hero-content { max-width: 800px; opacity: 0; transform: translateY(40px); transition: 1s var(--transition); }
        .hero-content.active { opacity: 1; transform: translateY(0); }

        .movie-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 217, 255, 0.12);
            border: 1px solid rgba(0, 217, 255, 0.2);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .hero-h1 { font-size: 4rem; font-weight: 900; line-height: 0.95; margin-bottom: 20px; text-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .hero-p { font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 35px; max-width: 600px; }

        .btn-flex { display: flex; gap: 15px; }
        .btn-main {
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.4s var(--transition);
            border: none;
        }
        .btn-primary { 
            background: linear-gradient(135deg, var(--accent), var(--accent-purple)); 
            color: white; 
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }
        .btn-primary:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 15px 40px rgba(0, 217, 255, 0.5); }
        
        .btn-sec { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
        }
        .btn-sec:hover { background: rgba(255,255,255,0.25); }

        /* MAIN CONTENT GRID */
        .container { padding: 40px; margin-top: -120px; position: relative; z-index: 10; }

        .row-section { margin-bottom: 50px; position: relative; }
        .row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .row-title { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }

        /* ARROW SYSTEM (FIXED) */
        .row-container { position: relative; display: flex; align-items: center; }
        .row-scroll {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 20px 5px;
            scroll-behavior: smooth;
        }
        .row-scroll::-webkit-scrollbar { display: none; }

        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 100px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
        }
        .row-container:hover .arrow-btn { opacity: 1; }
        .arrow-btn:hover { background: var(--accent); color: black; border-color: var(--accent); }
        .arrow-prev { left: -25px; }
        .arrow-next { right: -25px; }

        /* CARD SYSTEM */
        .m-card {
            flex: 0 0 260px;
            height: 380px;
            position: relative;
            border-radius: 24px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.5s var(--transition);
            overflow: hidden;
        }
        .m-card:hover {
            transform: translateY(-15px) rotate(1deg);
            z-index: 100;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 25px rgba(0, 217, 255, 0.25);
            border-color: var(--accent);
        }
        .m-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }
        .m-card:hover img { transform: scale(1.15) blur(3px); opacity: 0.6; }
        
        .m-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(5, 7, 10, 1) 5%, transparent 80%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            opacity: 0;
            transition: 0.4s;
        }
        .m-card:hover .m-overlay { opacity: 1; }

        .m-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
        .m-meta { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .q-badge { background: var(--accent); color: black; font-weight: 900; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; }

        /* UNIVERSAL MODAL SYSTEM */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.5s;
        }
        .modal.active { display: flex; opacity: 1; }

        .m-content {
            background: var(--bg-card);
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            position: relative;
            transform: scale(0.85);
            transition: 0.5s var(--transition);
        }
        .modal.active .m-content { transform: scale(1); }

        .m-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2100;
            transition: 0.3s;
        }
        .m-close:hover { background: var(--accent-pink); border-color: var(--accent-pink); transform: rotate(90deg); }

        /* BRUT PLAYER SYSTEM */
        .player-frame { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: black; }
        .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        
        .brut-controls {
            background: #000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }
        .server-wrap { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .s-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #ddd;
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .s-btn.active { background: white; color: black; border-color: white; }
        
        .repair-brut {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        /* FALLBACKS */
        @-moz-document url-prefix() {
            header, .arrow-btn, .m-content { backdrop-filter: none !important; background: rgba(12, 15, 23, 0.98) !important; }
        }

        @media (max-width: 1024px) {
            header { padding: 15px 30px; }
            .hero-h1 { font-size: 3.5rem; }
            .container { padding: 30px; }
            .search-container { width: 200px; }
            .search-container:focus-within { width: 280px; }
        }

        @media (max-width: 768px) {
            header { padding: 12px 20px; }
            nav { display: none; }
            .search-container { display: none; }
            .hero { height: 70vh; padding: 0 20px; }
            .hero-h1 { font-size: 2.5rem; }
            .hero-p { font-size: 1rem; line-height: 1.5; margin-bottom: 25px; }
            .container { padding: 20px; margin-top: -50px; }
            .row-title { font-size: 1.4rem; }
            .m-card { flex: 0 0 180px; height: 260px; border-radius: 18px; }
            .m-title { font-size: 0.9rem; }
            .arrow-btn { display: none; }
            .btn-flex { flex-direction: column; width: 100%; }
            .btn-main { width: 100%; justify-content: center; padding: 12px 20px; }
            .branding .brand-text { display: none; }
            .m-content { border-radius: 20px; width: 95%; max-height: 85vh; }
            .m-close { width: 40px; height: 40px; top: 15px; right: 15px; font-size: 1.4rem; }
            .brut-controls { padding: 15px 20px; flex-direction: column; gap: 15px; align-items: stretch; }
            .server-wrap { justify-content: center; }
            #dynamicRows { margin-top: 20px; }
        }

        @media (max-width: 480px) {
            .hero-h1 { font-size: 2.2rem; }
            .m-card { flex: 0 0 140px; height: 200px; border-radius: 14px; }
            .row-scroll { gap: 12px; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>
    <div class="ambient-glow glow-top"></div>
    <div class="ambient-glow glow-bottom"></div>

    <header id="mainHeader">
        <div class="branding" onclick="location.reload()">
            <div class="logo-ring">OS</div>
            <div class="brand-text">
                <h1>OPEN STREAM</h1>
                <span>BY SOLUTIONS TECHNOLOGIES</span>
            </div>
        </div>

        <nav>
            <a class="nav-link active" onclick="filterType('all')">ACCUEIL</a>
            <a class="nav-link" onclick="filterType('movie')">FILMS</a>
            <a class="nav-link" onclick="filterType('tv')">SÉRIES</a>
            <a class="nav-link" onclick="scrollToRows()">TENDANCES</a>
        </nav>

        <div class="search-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="masterSearch" placeholder="Rechercher un chef-d'œuvre...">
        </div>
    </header>

    <section class="hero" id="heroView">
        <div class="hero-bg" id="hBg"></div>
        <div id="heroTrailer"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content" id="hContent">
            <div class="movie-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                LEADERBOARD DU MOIS
            </div>
            <h1 class="hero-h1" id="hTitle">Chargement...</h1>
            <p class="hero-p" id="hDesc">Exploration des archives galactiques en cours. Préparez votre visionnage haute définition.</p>
            
            <div class="btn-flex">
                <button class="btn-main btn-primary" id="hPlay">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    LECTURE
                </button>
                <button class="btn-main btn-sec" id="hInfos">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    DÉTAILS
                </button>
            </div>
        </div>
    </section>

    <div class="container">
        
        <div id="dynamicRows">
            <!-- Content injected here -->
        </div>

    </div>

    <!-- REBULD PLAYER MODAL (With Brut Loader System) -->
    <div class="modal" id="pModal">
        <div class="m-content">
            <div class="m-close" onclick="closePlayer()">&times;</div>
            <div class="player-frame">
                <iframe id="brutPlayer" 
                        allowfullscreen 
                        allow="autoplay; encrypted-media; fullscreen"
                        sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation">
                </iframe>
            </div>
            <div class="brut-controls">
                <div class="server-wrap" id="svGrid"></div>
                <button class="repair-brut" onclick="reclaimPlayer()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 10l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    RÉPARER LE FLUX
                </button>
            </div>
        </div>
    </div>

    <script>
        /* ----------------------------------------------------
           CORE ENGINE (OX MASTER REBUILD)
        ---------------------------------------------------- */
        const TMDB_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb';
        let mainCatalog = [];
        let activeItem = null;
        let activeServer = 'vl';
        
        // Anti-Sandbox / Anti-Flagged Servers
        const SERVERS = [
            { id: 'vl', name: 'FLUX FR 1', url: item => `https://frembed.pro/api/${item.type === 'movie' ? 'film' : 'serie'}.php?id=${item.tmdbId}` },
            { id: 'ae', name: 'FR AUTO', url: item => `https://autoembed.co/${item.type === 'movie' ? 'movie' : 'tv'}/tmdb/${item.tmdbId}?lang=fr` },
            { id: 'vp', name: 'VIDSRC PRO', url: item => `https://vidsrc.pro/embed/${item.type === 'movie' ? 'movie' : 'tv'}/${item.tmdbId}` },
            { id: 'me', name: 'VANILLA ME', url: item => `https://vidsrc.me/embed/${item.type === 'movie' ? 'movie' : 'tv'}?tmdb=${item.tmdbId}` },
            { id: 'su', name: 'CLOUD EMBED', url: item => `https://embed.su/embed/${item.type === 'movie' ? 'movie' : 'tv'}/${item.tmdbId}` }
        ];

        window.onload = async () => {
            initParticles();
            await syncCatalog();
            setupSearch();
            window.onscroll = () => {
                const h = document.getElementById('mainHeader');
                if (window.scrollY > 50) h.classList.add('scrolled');
                else h.classList.remove('scrolled');
            };
        };

        /* ----------------------------------------------------
           DATA SYNC
        ---------------------------------------------------- */
        async function syncCatalog() {
            try {
                const calls = [
                    `https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}&language=fr-FR`,
                    `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}&language=fr-FR`,
                    `https://api.themoviedb.org/3/tv/top_rated?api_key=${TMDB_KEY}&language=fr-FR`
                ];

                const results = await Promise.all(calls.map(url => fetch(url).then(r => r.json())));
                let raw = [];
                results.forEach(res => raw = [...raw, ...res.results]);

                mainCatalog = raw.filter(i => i.poster_path && i.backdrop_path).map(i => ({
                    id: i.id,
                    tmdbId: i.id,
                    type: i.media_type || (i.title ? 'movie' : 'tv'),
                    title: i.title || i.name,
                    overview: i.overview || "Résumé en cours de chargement...",
                    poster: `https://image.tmdb.org/t/p/w500${i.poster_path}`,
                    backdrop: `https://image.tmdb.org/t/p/original${i.backdrop_path}`,
                    rating: i.vote_average.toFixed(1),
                    year: (i.release_date || i.first_air_date || '2024').split('-')[0],
                    genres: i.genre_ids
                }));

                // Unique filter
                mainCatalog = Array.from(new Map(mainCatalog.map(m => [m.id, m])).values());

                renderRows();
                setHero(mainCatalog[0]);
            } catch (e) {
                console.error("Catalog Sync Failed", e);
            }
        }

        /* ----------------------------------------------------
           ROW RENDERING & ARROW CONTROL
        ---------------------------------------------------- */
        function renderRows() {
            const sections = [
                { id: 'trend', title: 'TENDANCES ACTUELLES', filter: () => true },
                { id: 'movies', title: 'CINÉMA PREMIUM', filter: i => i.type === 'movie' },
                { id: 'series', title: 'SÉRIES TOP RATED', filter: i => i.type === 'tv' }
            ];

            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = '';

            sections.forEach(sec => {
                const filtered = mainCatalog.filter(sec.filter).slice(0, 15);
                if (filtered.length === 0) return;

                const row = document.createElement('div');
                row.className = 'row-section';
                row.innerHTML = `
                    <div class="row-header"><h2 class="row-title">${sec.title}</h2></div>
                    <div class="row-container">
                        <button class="arrow-btn arrow-prev" onclick="scrollRow('${sec.id}', -1)">&#10094;</button>
                        <div class="row-scroll" id="row-${sec.id}"></div>
                        <button class="arrow-btn arrow-next" onclick="scrollRow('${sec.id}', 1)">&#10095;</button>
                    </div>
                `;
                
                const scrollEl = row.querySelector('.row-scroll');
                filtered.forEach(item => scrollEl.appendChild(createCard(item)));
                grid.appendChild(row);
            });
        }

        function createCard(item) {
            const el = document.createElement('div');
            el.className = 'm-card';
            el.onclick = () => openPlayer(item);
            el.innerHTML = `
                <img src="${item.poster}" loading="lazy">
                <div class="m-overlay">
                    <h3 class="m-title">${item.title}</h3>
                    <div class="m-meta">
                        <span class="q-badge">4K</span>
                        <span>${item.year}</span>
                        <span style="color:#ffd700">★ ${item.rating}</span>
                    </div>
                </div>
            `;
            return el;
        }

        function scrollRow(id, dir) {
            const el = document.getElementById(`row-${id}`);
            el.scrollLeft += (dir * 800);
        }

        /* ----------------------------------------------------
           BRUT LOADER SYSTEM (ANTI-BLOCKED)
        ---------------------------------------------------- */
        function openPlayer(item, serverId = 'vl') {
            activeItem = item;
            activeServer = serverId;
            const modal = document.getElementById('pModal');
            const iframe = document.getElementById('brutPlayer');
            const svGrid = document.getElementById('svGrid');
            
            // Rebuild Server Buttons
            svGrid.innerHTML = '';
            SERVERS.forEach(s => {
                const b = document.createElement('button');
                b.className = `s-btn ${activeServer === s.id ? 'active' : ''}`;
                b.innerText = s.name;
                b.onclick = () => openPlayer(activeItem, s.id);
                svGrid.appendChild(b);
            });

            // BRUT LOADING LOGIC
            const server = SERVERS.find(s => s.id === activeServer);
            const targetUrl = server.url(activeItem);
            
            iframe.src = targetUrl;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            console.log(`[OX BRUT] Loading Flux: ${targetUrl}`);
        }

        function reclaimPlayer() {
            if(!activeItem) return;
            console.warn("[OX RECOVERY] Sandbox Flag Detected. Attempting Rebuild Load...");
            // Cycle to next server automatically if user reports broken flux
            const idx = SERVERS.findIndex(s => s.id === activeServer);
            const next = SERVERS[(idx + 1) % SERVERS.length];
            openPlayer(activeItem, next.id);
        }

        function closePlayer() {
            document.getElementById('pModal').classList.remove('active');
            document.getElementById('brutPlayer').src = '';
            document.body.style.overflow = '';
        }

        /* ----------------------------------------------------
           SEARCH & HERO
        ---------------------------------------------------- */
        function setupSearch() {
            document.getElementById('masterSearch').oninput = e => {
                const q = e.target.value.toLowerCase();
                const filtered = mainCatalog.filter(i => i.title.toLowerCase().includes(q));
                if(q.length > 0) {
                    const grid = document.getElementById('dynamicRows');
                    grid.innerHTML = `<h2 class="row-title">RÉSULTATS DE RECHERCHE</h2><div class="row-scroll" style="flex-wrap:wrap"></div>`;
                    const inner = grid.querySelector('.row-scroll');
                    filtered.forEach(i => inner.appendChild(createCard(i)));
                } else {
                    renderRows();
                }
            };
        }

        function setHero(item) {
            document.getElementById('hBg').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('hTitle').innerText = item.title;
            document.getElementById('hDesc').innerText = item.overview.slice(0, 200) + '...';
            document.getElementById('hContent').classList.add('active');
            document.getElementById('hPlay').onclick = () => openPlayer(item);
            loadHeroTrailer(item);
        }

        async function loadHeroTrailer(item) {
            const box = document.getElementById('heroTrailer');
            box.innerHTML = ''; box.style.opacity = '0';
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${item.type}/${item.id}/videos?api_key=${TMDB_KEY}`).then(r => r.json());
                const tr = res.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if(tr) {
                    setTimeout(() => {
                        box.innerHTML = `<iframe src="https://www.youtube.com/embed/${tr.key}?autoplay=1&mute=1&controls=0&loop=1&playlist=${tr.key}"></iframe>`;
                        box.style.opacity = '0.5';
                    }, 4000);
                }
            } catch(e){}
        }

        /* ----------------------------------------------------
           CANVAS PARTICLES
        ---------------------------------------------------- */
        function initParticles() {
            const c = document.getElementById('particles');
            const ctx = c.getContext('2d');
            let pts = [];
            const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
            window.onresize = resize; resize();
            class Pt {
                constructor() { this.x = Math.random()*c.width; this.y = Math.random()*c.height; this.s = Math.random()*1.8; this.vx = Math.random()-0.5; this.vy = Math.random()-0.5; this.o = Math.random(); }
                up() { this.x += this.vx; this.y += this.vy; if(this.x>c.width)this.x=0; if(this.y>c.height)this.y=0; if(this.x<0)this.x=c.width; if(this.y<0)this.y=c.height; }
                dr() { ctx.fillStyle = `rgba(255,255,255,${this.o*0.3})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
            }
            for(let i=0; i<80; i++) pts.push(new Pt());
            const anim = () => { ctx.clearRect(0,0,c.width,c.height); pts.forEach(p=>{p.up(); p.dr();}); requestAnimationFrame(anim); };
            anim();
        }

        function scrollToRows() { window.scrollTo({top: window.innerHeight - 100, behavior: 'smooth'}); }
    </script>
</body>
</html>
