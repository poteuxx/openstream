<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStream PRO | L'Avenir du Streaming Automatisé</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Plateforme de streaming futuriste premium avec catalogue TMDB en temps réel, lecteurs multi-flux et interface immersive.">
    <meta name="keywords" content="OpenStream, Poteuxx, Streaming, HD, Films, Séries, Animés">
    <link rel="icon" href="https://fav.farm/📺">
    
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #03050a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent: #00f2ff;
            --accent-purple: #9d50bb;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --glass: rgba(8, 12, 18, 0.85); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif; }

        body { background: var(--bg-deep); color: var(--text); overflow-x: hidden; min-height: 100vh; scroll-behavior: smooth; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; z-index: 1500; display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; background: var(--glass); backdrop-filter: blur(30px); border-bottom: 1px solid var(--glass-border); }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; cursor: pointer; }
        .logo-badge { width: 44px; height: 44px; background: linear-gradient(135deg, #00f2ff, #9d50bb); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; font-size: 1.2rem; box-shadow: 0 0 25px var(--accent-glow); }
        .logo-text h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; line-height: 1; }
        .logo-text span { font-size: 0.55rem; color: var(--accent); font-weight: 800; letter-spacing: 1px; opacity: 0.8; text-transform: uppercase; }

        nav { display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 14px; border: 1px solid var(--glass-border); }
        .nav-link { padding: 8px 18px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.8rem; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: white; background: linear-gradient(90deg, #00f2ff, #0072ff); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

        /* COLLAPSIBLE SEARCH SYSTEM */
        .search-shell { position: relative; display: flex; align-items: center; justify-content: flex-end; width: 45px; height: 45px; transition: 0.6s var(--transition); overflow: hidden; background: rgba(255,255,255,0.05); border-radius: 25px; border: 1px solid var(--glass-border); cursor: pointer; }
        .search-shell:hover, .search-shell:focus-within { width: 320px; background: rgba(0,0,0,0.4); border-color: var(--accent); cursor: text; }
        .search-shell input { width: 100%; border: none; background: transparent; color: white; padding: 0 50px 0 20px; font-size: 0.95rem; opacity: 0; transition: 0.3s; }
        .search-shell:hover input, .search-shell:focus-within input { opacity: 1; }
        .search-btn { position: absolute; right: 0; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: var(--accent); transition: 0.3s; }
        .search-shell:hover .search-btn { color: white; pointer-events: none; }

        /* PERSISTENT GLOBAL HERO ENGINE */
        .hero { position: relative; width: 100%; height: 85vh; display: flex; align-items: center; padding: 0 60px; overflow: hidden; background: #000; }
        .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: -2; transition: opacity 1.5s ease; filter: brightness(0.6); }
        #heroTrailer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; transform: scale(1.15); opacity: 0; transition: opacity 1s; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, var(--bg-deep) 15%, transparent 100%), linear-gradient(0deg, var(--bg-deep) 0%, transparent 40%); z-index: 0; }
        
        .hero-content { position: relative; z-index: 10; max-width: 850px; transition: 0.5s var(--transition); }
        .hero-h1 { font-size: 4rem; font-weight: 950; line-height: 1; margin-bottom: 25px; text-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .hero-p { font-size: 1.1rem; color: #cbd5e1; line-height: 1.7; margin-bottom: 40px; max-width: 650px; }
        
        .mute-toggle { position: absolute; bottom: 60px; right: 60px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: 0.4s; }
        .mute-toggle.active-sound { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 30px var(--accent); }

        /* GRID & LAYOUT */
        .container { padding: 40px 60px; margin-top: -150px; position: relative; z-index: 50; max-width: 1920px; margin-left: auto; margin-right: auto; }
        
        .welcome-panel {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(157, 80, 187, 0.1));
            border: 1px solid var(--glass-border); border-radius: 35px;
            padding: 70px 60px; margin-bottom: 80px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; gap: 30px; backdrop-filter: blur(30px);
            box-shadow: 0 50px 120px rgba(0,0,0,0.9), 0 0 40px rgba(0, 242, 255, 0.05);
        }
        .welcome-panel h2 { font-size: 3.5rem; font-weight: 950; color: var(--accent); }

        .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 50px; }
        .sidebar { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 25px; overflow: hidden; height: fit-content; position: sticky; top: 100px; }
        
        .side-body { padding: 30px; }
        .side-title { font-size: 0.9rem; font-weight: 900; color: var(--accent); margin-bottom: 25px; letter-spacing: 2px; }
        .side-item { display: flex; gap: 15px; margin-bottom: 20px; cursor: pointer; transition: 0.4s; border-radius: 12px; padding: 5px; }
        .side-item:hover { background: rgba(255,255,255,0.03); }
        .side-item img { width: 55px; height: 80px; border-radius: 8px; object-fit: cover; }

        /* CARDS */
        .row-title { font-size: 1.8rem; font-weight: 950; margin-bottom: 25px; letter-spacing: -1px; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .m-card { height: 160px; position: relative; border-radius: 15px; background: var(--bg-card); border: 1px solid var(--glass-border); cursor: pointer; transition: 0.5s var(--transition); overflow: hidden; }
        .m-card:hover { transform: scale(1.15) translateY(-5px); z-index: 100; box-shadow: 0 20px 80px rgba(0,0,0,1), 0 0 30px var(--accent-glow); border-color: rgba(255,255,255,0.6); }
        .m-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .m-card:hover img { filter: brightness(0.3); }
        .m-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; opacity: 0; transition: 0.3s; }
        .m-card:hover .m-overlay { opacity: 1; }
        .m-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 12px; }

        .m-btn { width: 34px; height: 34px; border-radius: 50%; background: white; color: black; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: none; font-weight: 950; font-size: 0.8rem; }
        .m-btn:hover { transform: scale(1.1); background: var(--accent); }

        /* MODALS */
        .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.96); backdrop-filter: blur(40px); display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.4s var(--transition); }
        .modal.active { display: flex; opacity: 1; }
        .m-content { background: #080a12; width: 95%; max-width: 1100px; max-height: 92vh; border-radius: 25px; border: 1px solid var(--glass-border); overflow-y: auto; position: relative; }
        .m-close { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10000; transition: 0.3s; }
        .m-close:hover { background: #ff4757; transform: rotate(90deg); }

        .player-frame { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; background: #000; }
        .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        
        .brut-controls { background: #05070a; padding: 30px; display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center; border-top: 1px solid var(--glass-border); }
        .sv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .s-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #888; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; transition: 0.3s; }
        .s-btn.active { background: var(--accent); color: black; border-color: var(--accent); }
        .repair-brut { background: #ff4757; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }

        .btn-main { padding: 16px 35px; border-radius: 14px; font-weight: 950; cursor: pointer; border: none; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; }
        .btn-primary { background: linear-gradient(90deg, #00f2ff, #0072ff); color: white; box-shadow: 0 0 20px rgba(0, 217, 255, 0.4); }
        .btn-sec { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-main:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo" onclick="location.reload()">
            <div class="logo-badge">OS</div>
            <div class="logo-text"><h1>OPEN STREAM</h1><span>BY SOLUTIONS TECHNOLOGIES</span></div>
        </div>
        <nav>
            <a class="nav-link active" onclick="switchView('home')">ACCEUIL</a>
            <a class="nav-link" onclick="switchView('movie')">FILMS</a>
            <a class="nav-link" onclick="switchView('tv')">SÉRIES</a>
            <a class="nav-link" onclick="switchView('docu')">DOCUS</a>
        </nav>
        <div class="search-shell">
            <input type="text" id="masterSearch" placeholder="Rechercher un chef-d'œuvre...">
            <div class="search-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>
        </div>
    </header>

    <section class="hero" id="heroView">
        <div class="hero-bg" id="hBg"></div>
        <div id="heroTrailer"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hContent">
            <h1 class="hero-h1" id="hTitle">Chargement...</h1>
            <p class="hero-p" id="hDesc">Exploration des archives galactiques en cours...</p>
            <div style="display:flex; gap:25px">
                <button class="btn-main btn-primary" onclick="playCurrentHero()">LECTURE</button>
                <button class="btn-main btn-sec" onclick="infoCurrentHero()">DÉTAILS</button>
            </div>
        </div>
        <button class="mute-toggle" id="muteBtn" onclick="toggleHeroSound()">
            <svg id="volIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
    </section>

    <div class="container">
        <div id="dynamicRows"></div>
    </div>

    <!-- MODAL DETAILS -->
    <div class="modal info-modal" id="iModal">
        <div class="m-content">
            <div class="m-close" onclick="closeModal('iModal')">&times;</div>
            <div id="iHero" style="height:500px; background-size:cover; background-position:center;"></div>
            <div style="padding:50px 70px; display:grid; grid-template-columns: 1.7fr 1.3fr; gap:60px;">
                <div>
                    <h2 id="iTitle" style="font-size:3.5rem; font-weight:950; margin-bottom:20px;">Title</h2>
                    <p id="iDesc" style="font-size:1.15rem; line-height:1.8; color:#cbd5e1;"></p>
                    <button class="btn-main btn-primary" id="iPlayBtn" style="margin-top:40px">LECTURE IMMÉDIATE</button>
                </div>
                <div>
                    <div style="font-size:1.1rem; margin-bottom:15px; color:var(--accent); font-weight:800;">DISTRIBUTION</div>
                    <div id="iCast" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div class="modal" id="pModal">
        <div class="m-content">
            <div class="m-close" onclick="closePlayer()">&times;</div>
            <div class="player-frame" id="playerWrapper"></div>
            <div class="brut-controls">
                <div class="sv-grid" id="svButtons"></div>
                <button class="repair-brut" onclick="reclaimPlayer(true)">RECLAMATION FORCE</button>
            </div>
        </div>
    </div>

    <script>
        const TMDB_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb';
        let mainCatalog = [];
        let heroItem = null;
        let ytPlayer = null;
        let pMuted = true;
        let activeItem = null;
        let activeServerId = 's1';

        const SERVERS = [
            { id: 's1', name: 'INDUSTRIE 1', url: i => `https://frembed.pro/api/${i.type==='tv'?'serie':'film'}.php?id=${i.tmdbId}` },
            { id: 's2', name: 'INDUSTRIE 2', url: i => `https://vidsrc.to/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's3', name: 'AUTO FLUX', url: i => `https://autoembed.co/${i.type==='tv'?'tv':'movie'}/tmdb/${i.tmdbId}?lang=fr` },
            { id: 's4', name: 'PRIME HUB', url: i => `https://vidsrc.me/embed/${i.type==='tv'?'tv':'movie'}?tmdb=${i.tmdbId}` },
            { id: 's5', name: 'INDUSTRIE 5', url: i => `https://vidsrc.xyz/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's6', name: 'INDUSTRIE 6', url: i => `https://embed.su/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's7', name: 'INDUSTRIE 7', url: i => `https://vidsrc.pro/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's8', name: 'INDUSTRIE 8', url: i => `https://moviesapi.club/movie/${i.tmdbId}` },
            { id: 's9', name: 'INDUSTRIE 9', url: i => `https://rembed.pro/api/${i.type==='tv'?'serie':'film'}.php?id=${i.tmdbId}` },
            { id: 's10', name: 'INDUSTRIE 10', url: i => `https://vidjoy.pro/embed/${i.tmdbId}` },
            { id: 's11', name: 'INDUSTRIE 11', url: i => `https://streamapi.cloud/embed/${i.tmdbId}` },
            { id: 's12', name: 'INDUSTRIE 12', url: i => `https://vidsrc.stream/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's13', name: 'INDUSTRIE 13', url: i => `https://2embed.org/library/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's14', name: 'INDUSTRIE 14', url: i => `https://vidsrc.online/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's15', name: 'INDUSTRIE 15', url: i => `https://vidbinge.com/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's16', name: 'INDUSTRIE 16', url: i => `https://vidsrc.cc/v2/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's17', name: 'INDUSTRIE 17', url: i => `https://embed.vidsrc.top/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's18', name: 'INDUSTRIE 18', url: i => `https://superembed.stream/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's19', name: 'INDUSTRIE 19', url: i => `https://database.gdriveplayer.us/player.php?tmdb=${i.tmdbId}` },
            { id: 's20', name: 'INDUSTRIE 20', url: i => `https://blackvid.space/embed/${i.tmdbId}` },
            { id: 's21', name: 'INDUSTRIE 21', url: i => `https://hydro.link/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` },
            { id: 's22', name: 'INDUSTRIE 22', url: i => `https://multiembed.mov/?video_id=${i.tmdbId}&tmdb=1` },
            { id: 's23', name: 'INDUSTRIE 23', url: i => `https://embed.smashystream.com/playere.php?tmdb=${i.tmdbId}` },
            { id: 's24', name: 'INDUSTRIE 24', url: i => `https://vidsrc.icu/embed/${i.type==='tv'?'tv':'movie'}/${i.tmdbId}` }
        ];

        window.onload = async () => {
            loadYTAPI();
            await syncCatalog();
            setupSearch();
            switchView('home');
        };

        function loadYTAPI() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        async function syncCatalog() {
            const endpoints = ['trending/all/day', 'movie/popular', 'tv/popular', 'discover/movie?with_genres=99'];
            let calls = [];
            endpoints.forEach(ep => { for(let p=1; p<=4; p++) calls.push(`https://api.themoviedb.org/3/${ep}?api_key=${TMDB_KEY}&language=fr-FR&page=${p}`); });
            const results = await Promise.all(calls.map(url => fetch(url).then(r => r.json())));
            let raw = [];
            results.forEach(res => { if(res.results) raw = [...raw, ...res.results] });
            mainCatalog = raw.filter(i => i.poster_path && i.backdrop_path).map(i => ({
                id: i.id, tmdbId: i.id,
                type: i.media_type === 'tv' ? 'tv' : (i.genre_ids.includes(99) ? 'docu' : 'movie'),
                title: i.title || i.name,
                overview: i.overview || "Résumé non disponible.",
                poster: `https://image.tmdb.org/t/p/w500${i.poster_path}`,
                backdrop: `https://image.tmdb.org/t/p/original${i.backdrop_path}`,
                year: (i.release_date || i.first_air_date || '2024').split('-')[0],
                genres: i.genre_ids.join(', ')
            }));
            const seen = new Set();
            mainCatalog = mainCatalog.filter(i => { const d = seen.has(i.id + i.type); seen.add(i.id + i.type); return !d; });
            initHero(mainCatalog[0]);
        }

        async function initHero(item) {
            heroItem = item;
            document.getElementById('hBg').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('hTitle').innerText = item.title;
            document.getElementById('hDesc').innerText = item.overview;
            
            const res = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`).then(r=>r.json());
            const tr = res.results.find(v => v.type==='Trailer');
            if(tr && window.YT) {
                if(ytPlayer) {
                    ytPlayer.loadVideoById(tr.key);
                } else {
                    ytPlayer = new YT.Player('heroTrailer', {
                        videoId: tr.key,
                        playerVars: { autoplay: 1, controls: 0, mute: 1, loop: 1, playlist: tr.key },
                        events: { onReady: e => { e.target.playVideo(); document.getElementById('heroTrailer').style.opacity = 1; } }
                    });
                }
            }
        }

        function toggleHeroSound() {
            if(!ytPlayer) return;
            pMuted = !pMuted;
            const btn = document.getElementById('muteBtn');
            if(pMuted) { ytPlayer.mute(); btn.classList.remove('active-sound'); }
            else { ytPlayer.unMute(); btn.classList.add('active-sound'); }
        }

        function playCurrentHero() { openPlayer(heroItem); }
        function infoCurrentHero() { showItemDetails(heroItem); }

        function switchView(view) {
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if(l.getAttribute('onclick').includes(`'${view}'`)) l.classList.add('active');
            });
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = '';
            
            // Hero is GLOBAL but content changes
            const hCont = document.getElementById('hContent');
            if(view === 'home') {
                hCont.style.opacity = '1';
                hCont.style.pointerEvents = 'auto';
                renderDashboard();
            } else {
                hCont.style.opacity = '0';
                hCont.style.pointerEvents = 'none';
                renderGrid(view);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function renderDashboard() {
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `
                <div class="welcome-panel">
                    <h2>Exploration Dashboard</h2>
                    <p>Accès à <b>${mainCatalog.length} titres</b> synchronisés en haute performance.</p>
                </div>
                <div class="main-layout">
                    <div id="mainArea"></div>
                    <div class="sidebar">
                        <div class="side-body"><div class="side-title">TOP TENDANCES</div><div id="topList"></div></div>
                    </div>
                </div>
            `;
            const area = document.getElementById('mainArea');
            [{t:'VOS TENDANCES', f:()=>true}].forEach(sec => {
                const row = document.createElement('div');
                row.className = 'row-section';
                row.innerHTML = `<h2 class="row-title">${sec.t}</h2><div class="grid-view"></div>`;
                mainCatalog.slice(0,16).forEach(i => row.querySelector('.grid-view').appendChild(createCard(i)));
                area.appendChild(row);
            });
            mainCatalog.slice(5,15).forEach((item,idx) => {
                const el = document.createElement('div');
                el.className = 'side-item';
                el.onclick = () => showItemDetails(item);
                el.innerHTML = `<img src="${item.poster}"><div class="side-info"><div class="side-name">${item.title}</div><div style="font-size:0.7rem; color:var(--accent)">#${idx+1} RANKING</div></div>`;
                document.getElementById('topList').appendChild(el);
            });
        }

        function renderGrid(type) {
            const grid = document.getElementById('dynamicRows');
            grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">${type.toUpperCase()}S PREMIUM</h2><div class="grid-view"></div>`;
            mainCatalog.filter(i => i.type === type).forEach(i => grid.querySelector('.grid-view').appendChild(createCard(i)));
        }

        function createCard(item) {
            const el = document.createElement('div');
            el.className = 'm-card';
            el.innerHTML = `<img src="${item.poster}"><div class="m-overlay"><div class="m-title">${item.title}</div><div style="display:flex; gap:10px"><button class="m-btn" onclick="event.stopPropagation(); openPlayer(mainCatalog.find(i=>i.id==${item.id}))">▶</button><button class="m-btn" onclick="event.stopPropagation(); showItemDetails(mainCatalog.find(i=>i.id==${item.id}))">i</button></div></div>`;
            el.onclick = () => showItemDetails(item);
            el.onmouseenter = () => updateHeroTeaser(item);
            el.onmouseleave = () => restoreHeroTeaser();
            return el;
        }

        async function updateHeroTeaser(item) {
            if(!ytPlayer) return;
            const res = await fetch(`https://api.themoviedb.org/3/${item.type==='tv'?'tv':'movie'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`).then(r=>r.json());
            const tr = res.results.find(v => v.type==='Trailer');
            if(tr) ytPlayer.loadVideoById(tr.key);
        }

        function restoreHeroTeaser() { if(heroItem && ytPlayer) updateHeroTeaser(heroItem); }

        function showItemDetails(item) {
            if(!item) return;
            document.getElementById('iHero').style.backgroundImage = `url(${item.backdrop})`;
            document.getElementById('iTitle').innerText = item.title;
            document.getElementById('iDesc').innerText = item.overview;
            document.getElementById('iPlayBtn').onclick = () => openPlayer(item);
            const m = document.getElementById('iModal');
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('active'), 50);
        }

        function openPlayer(item) {
            if(!item) return;
            activeItem = item;
            if(ytPlayer) ytPlayer.pauseVideo();
            const modal = document.getElementById('pModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 50);
            renderServers();
            reclaimPlayer();
        }

        function renderServers() {
            const grid = document.getElementById('svButtons');
            grid.innerHTML = '';
            SERVERS.forEach(s => {
                const b = document.createElement('button');
                b.className = `s-btn ${s.id === activeServerId ? 'active' : ''}`;
                b.innerText = s.name;
                b.onclick = () => { activeServerId = s.id; renderServers(); reclaimPlayer(); };
                grid.appendChild(b);
            });
        }

        function reclaimPlayer() {
            const wrap = document.getElementById('playerWrapper');
            const server = SERVERS.find(s => s.id === activeServerId);
            wrap.innerHTML = `<iframe src="${server.url(activeItem)}" allowfullscreen allow="autoplay; fullscreen"></iframe>`;
        }

        function closePlayer() { closeModal('pModal'); if(ytPlayer) ytPlayer.playVideo(); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); setTimeout(()=>document.getElementById(id).style.display='none', 400); }

        function setupSearch() {
            document.getElementById('masterSearch').oninput = (e) => {
                const q = e.target.value.toLowerCase();
                const grid = document.getElementById('dynamicRows');
                if(q.length < 2) { if(window.location.hash !== '#home') return; renderDashboard(); return; }
                const filtered = mainCatalog.filter(i => i.title.toLowerCase().includes(q));
                grid.innerHTML = `<h2 class="row-title" style="margin-top:100px">RÉSULTATS POUR "${q.toUpperCase()}"</h2><div class="grid-view"></div>`;
                filtered.forEach(i => grid.querySelector('.grid-view').appendChild(createCard(i)));
            };
        }
    </script>
</body>
</html>
